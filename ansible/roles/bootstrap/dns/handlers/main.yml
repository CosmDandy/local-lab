---
- name: Restart systemd-resolved
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: restarted

- name: Restart pdns
  ansible.builtin.systemd_service:
    name: pdns
    state: restarted

- name: Restart pdns-recursor
  ansible.builtin.systemd_service:
    name: pdns-recursor
    state: restarted
