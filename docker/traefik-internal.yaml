services:
  traefik-internal:
    image: 'traefik:latest'
    container_name: 'traefik-internal'
    restart: 'unless-stopped'
    volumes:
      - '../configs/services/traefik-internal:/etc/traefik'
      - '../data/traefik-internal/letsencrypt:/letsencrypt'
      - '/var/run/docker.sock:/var/run/docker.sock'
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`internal.traefik.cosmdandy.ru`)"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.service=api@internal"
    ports:
      - '80:80'
      - '443:443'
    command:
      - "--api=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=tkondrashin@icloud.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"

networks:
  traefik_network:
    name: traefik_network
    driver: bridge

