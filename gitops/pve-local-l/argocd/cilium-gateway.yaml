apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CosmDandy/local-lab
    targetRevision: master
    path: gitops/pve-local-l/infrastructure/cilium-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
